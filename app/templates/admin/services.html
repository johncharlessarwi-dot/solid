{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-7xl px-4 py-10">
  <div class="flex items-center justify-between"><h1 class="text-3xl font-black">Services</h1><div class="flex gap-2"><a class="btn-secondary" href="{{ url_for('admin.new_category') }}">New Category</a><a class="btn-primary" href="{{ url_for('admin.new_service') }}">New Service</a></div></div>
  <div class="panel mt-6 overflow-hidden">
    <table class="table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Status</th></tr></thead><tbody>
      {% for service in services %}<tr><td>{{ service.name }}</td><td>{{ service.category.name }}</td><td>TZS {{ "{:,}".format(service.price) }}</td><td>{{ "Active" if service.is_active else "Inactive" }}</td></tr>{% endfor %}
    </tbody></table>
  </div>
</section>
{% endblock %}
