{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-lg px-4 py-12">
  <h1 class="text-3xl font-black">Profile</h1>
  <form method="post" class="panel mt-6 space-y-4 p-6">
    {{ form.hidden_tag() }}
    <div>{{ form.name.label(class="label") }}{{ form.name(class="field") }}</div>
    <div>{{ form.phone.label(class="label") }}{{ form.phone(class="field") }}</div>
    {{ form.submit(class="btn-primary") }}
    <a class="btn-secondary" href="{{ url_for('auth.change_password') }}">Change Password</a>
  </form>
</section>
{% endblock %}
